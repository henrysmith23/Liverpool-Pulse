name: hourly-run

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - run: python collector.py

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if [ -f latest_post.json ]; then git add latest_post.json; fi
          if [ -f seen_posts.json ]; then git add seen_posts.json; fi
          if [ -f last_run.json ]; then git add last_run.json; fi
          git commit -m "update pulse data" || echo "no changes"
          git push
